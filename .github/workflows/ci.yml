name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (iOS) + boundary check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for generic iOS
        run: >
          xcodebuild build
          -scheme PGPonyCore
          -destination 'generic/platform=iOS'

      # Tests run on a simulator. Pick the first available iPhone simulator
      # dynamically so this survives whatever Xcode/iOS the runner image ships
      # (and avoids the "Using the first of multiple matching destinations" warning
      # a loose name=...,OS=latest produces). Kept separate from the build above so a
      # simulator-naming mismatch can't mask a genuine build failure.
      - name: Test on iOS Simulator
        run: |
          # No `set -o pipefail`: the runner shell is `bash -e`, and pipefail plus an
          # early-closing pipe (grep -m1 / head) would let an upstream SIGPIPE fail the
          # whole command-substitution and kill the step even when a UDID was found.
          UDID=$(xcrun simctl list devices available \
                 | grep 'iPhone' \
                 | grep -Eo '[0-9A-Fa-f-]{36}' \
                 | head -n1)
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on this runner"; exit 1
          fi
          echo "Testing on simulator id=$UDID"
          xcodebuild test -scheme PGPonyCore -destination "id=$UDID"

      - name: Verify no app/platform imports leaked into the core
        run: |
          if grep -rlnE 'import (UIKit|AppKit|SwiftUI|SwiftData|Combine|ObjectivePGP)' Sources/; then
            echo "LEAK: an app/platform import is present in core sources"; exit 1
          else
            echo "CLEAN: core sources are free of app/UI/3rd-party imports"
          fi
      - name: Verify no stray print() (debug must go through pgpDebugLog)
        run: |
          if grep -rnE '(^|[^A-Za-z0-9._])print\(' Sources/ | grep -v 'Swift.print(message())'; then
            echo "A bare print() is present — route debug through pgpDebugLog or remove it"; exit 1
          else
            echo "CLEAN: no bare print() in core sources"
          fi
